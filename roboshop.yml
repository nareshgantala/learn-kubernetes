apiVersion: apps/v1
kind: Deployment
metadata:
  name: roboshop-frontend
  labels:
    app: roboshop-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: roboshop-frontend
  template:
    metadata:
      labels:
        app: roboshop-frontend
    spec:
      containers:
      - name: roboshop-frontend
        image: nareshroboshop.azurecr.io/roboshop-frontend
        ports:
        - containerPort: 80
      imagePullSecrets:
      - name: acr-secret
---
apiVersion: v1
kind: Service
metadata:
  name: roboshop-frontend
  annotations:
    # Tells AKS to bind this service to your specific Azure public IP resource
    service.beta.kubernetes.io/azure-load-balancer-resource-group: "denmark-east"
spec:
  type: LoadBalancer
  loadBalancerIP: "9.205.157.246" # Put the real IP address here
  selector:
    app: roboshop-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: roboshop-cart
  labels:
    app: roboshop-cart
spec:
  replicas: 1
  selector:
    matchLabels:
      app: roboshop-cart
  template:
    metadata:
      labels:
        app: roboshop-cart
    spec:
      containers:
      - name: roboshop-cart
        image: nareshroboshop.azurecr.io/roboshop-cart
        envFrom:
        - configMapRef:
            name: roboshop-cart        
      imagePullSecrets:
      - name: acr-secret
---
apiVersion: v1
kind: Service
metadata:
  name: roboshop-cart
spec:
  selector:
    app: roboshop-cart
  ports:
    - protocol: TCP
      port: 8003
      targetPort: 8003

